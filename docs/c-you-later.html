<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks For The Support!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #d3d3d3;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .logo {
            font-family: Fixedsys, monospace;
            font-weight: bold;
            font-stretch: condensed;
            letter-spacing: -0.02em;
            transform: scaleX(0.92);
            transform-origin: left;
            font-size: 1.5rem;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid;
            animation: typing 1.5s steps(11) forwards, blink 0.5s step-end infinite;
            width: 0;
            user-select: none;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            display: block;
            margin: 2rem auto 1.5rem;
            text-align: center;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 9ch; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4rem 2rem;
        }

        .message {
            font-size: 2.4rem;
            font-style: italic;
            margin-top: 1rem;
            text-align: center;
            font-family: 'Great Vibes', cursive;
            color: black;
        }

        .farewell-image {
            margin-top: 2rem;
            max-width: 300px;
            width: 100%;
            height: auto;
        }

        .thanks-text {
            margin-top: 1.5rem;
            font-family: "FF Meta", "Meta", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: white;
            text-align: center;
            max-width: 500px;
            font-size: 1.4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="index.html" class="logo">_Wheatley</a>
    <main>
        <p class="message">C-You Later!</p>
        <img src="c-you-later-image.png" alt="Smiling retro man pointing" class="farewell-image">
        <p class="thanks-text">Thanks for the download! I hope you enjoy this little bit of binary I decided to share.</p>
    </main>
</body>
</html>
