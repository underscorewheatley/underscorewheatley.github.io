<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #d3d3d3;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            border-bottom: 1px solid #999;
        }

        .page-title {
            font-family: sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            display: flex;
            gap: 2rem;
        }

        .page-title a {
            color: white;
            text-decoration: none;
        }

        .page-title a:hover {
            color: #333;
        }

        .logo {
            font-family: Fixedsys, monospace;
            font-weight: bold;
            font-stretch: condensed;
            letter-spacing: -0.02em;
            transform: scaleX(0.92);
            transform-origin: left;
            font-size: 1.5rem;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid;
            animation: typing 1.5s steps(11) forwards, blink 0.5s step-end infinite;
            width: 0;
            user-select: none;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .logo:hover {
            opacity: 0.7;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 9ch; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .page-title {
            font-family: "Sharp Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 1.8rem;
            font-weight: normal;
            letter-spacing: 0.05em;
            display: flex;
            gap: 1.5rem;
        }

        .page-title a {
            color: white;
            text-decoration: none;
        }

        main {
            padding: 6rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .boxes-row {
            display: flex;
            gap: 1rem;
        }

        .box {
            background-color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: bold;
            color: inherit;
            cursor: pointer;
            transition: background-color 1s, color 1s;
        }

        .box.active {
            background-color: black;
            color: white;
        }

        .box:hover {
            background-color: #e0e0e0;
            color: inherit;
        }

        .box.active:hover {
            background-color: black;
            color: white;
        }

        .box-content {
            display: none;
            margin-top: 1rem;
            max-width: 500px;
            text-align: center;
        }

        .box-content.active {
            display: block;
        }

        .release-info {
            border-top: 1px solid #999;
            border-bottom: 1px solid #999;
            padding: 1rem 0;
            margin-top: 0.5rem;
        }

        .release-title {
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">_Wheatley</a>
        <h1 class="page-title">
            <a href="downloads.html">@downloads</a>
        </h1>
    </header>
    <main>
        <div class="boxes-row">
            <span class="box" onclick="toggleContent(this, 'blog')">blogs</span>
            <span class="box" onclick="toggleContent(this, 'format1')">news</span>
            <span class="box" onclick="toggleContent(this, 'format2')">games</span>
            <span class="box" onclick="toggleContent(this, 'format3')">blockchain</span>
        </div>
        <div class="boxes-row">
            <span class="box" onclick="toggleContent(this, 'format4')">contacts</span>
            <span class="box" onclick="toggleContent(this, 'format5')">milk tea</span>
        </div>
        <div id="blog-content" class="box-content">
            <div class="release-info">
                <div class="release-title">Nothing here yet</div>
            </div>
        </div>
        <div id="format1-content" class="box-content">
            <div class="release-info">
                <div class="release-title">Nothing here yet</div>
            </div>
        </div>
        <div id="format2-content" class="box-content">
            <div class="release-info">
                <div class="release-title">Nothing here yet</div>
            </div>
        </div>
        <div id="format3-content" class="box-content">
            <div class="release-info">
                <div class="release-title">Nothing here yet</div>
            </div>
        </div>
        <div id="format4-content" class="box-content">
            <div class="release-info">
                <div class="release-title">Nothing here yet</div>
            </div>
        </div>
        <div id="format5-content" class="box-content">
            <div class="release-info">
                <div class="release-title">Nothing here yet</div>
            </div>
        </div>
    </main>

    <script>
        var activeBox = null;

        function toggleContent(element, id) {
            if (activeBox === id) {
                return;
            }
            
            document.querySelectorAll('.box').forEach(function(b) {
                b.classList.remove('active');
            });
            
            document.querySelectorAll('.box-content').forEach(function(c) {
                c.classList.remove('active');
            });
            
            element.classList.add('active');
            document.getElementById(id + '-content').classList.add('active');
            activeBox = id;
        }
    </script>
</body>
</html>
